<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lösenordshanterare</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Outfit',sans-serif;}
body{height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;background:#0f0f0f;color:white;}
body::before{content:"";position:absolute;width:200%;height:200%;background:linear-gradient(45deg,#0f2027,#203a43,#2c5364,#1c1c1c);animation:moveBg 15s ease infinite;z-index:-2;}
@keyframes moveBg{0%{transform:translate(0,0)}50%{transform:translate(-25%,-25%)}100%{transform:translate(0,0)}}
.circle{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.6;animation:float 10s infinite ease-in-out alternate;}
.circle1{width:300px;height:300px;background:#00f5ff;top:10%;left:15%;}
.circle2{width:250px;height:250px;background:#ff00c8;bottom:10%;right:15%;}
@keyframes float{from{transform:translateY(0px)}to{transform:translateY(-40px)}}
.card{width:420px;padding:50px 40px;border-radius:30px;background:rgba(255,255,255,0.08);backdrop-filter:blur(25px);border:1px solid rgba(255,255,255,0.1);box-shadow:0 25px 60px rgba(0,0,0,0.6);text-align:center;transition:0.5s;animation:fadeIn 1.2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
h2{font-weight:800;letter-spacing:2px;margin-bottom:30px;font-size:28px;}
.input-group{margin-bottom:20px;text-align:left;}
.input-group label{font-size:14px;opacity:0.8;}
.input-group input{width:100%;padding:12px;border-radius:15px;border:none;margin-top:8px;background:rgba(255,255,255,0.15);color:white;font-size:15px;outline:none;transition:0.3s;}
.input-group input:focus{background:rgba(255,255,255,0.25);box-shadow:0 0 15px rgba(0,255,255,0.6);}
button{padding:10px 14px;border:none;border-radius:15px;background:linear-gradient(45deg,#00f5ff,#ff00c8);color:white;font-weight:600;font-size:14px;cursor:pointer;transition:0.4s;margin-top:5px;}
button:hover{transform:scale(1.05);box-shadow:0 10px 30px rgba(255,0,200,0.5);}
.error{margin-top:15px;color:#ff6b6b;font-size:14px;}
.dashboard{display:none;flex-direction:column;gap:20px;align-items:center;animation:fadeIn 1s ease;}
.password-list{margin-top:20px;text-align:left;width:100%;}
.password-item{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;background:rgba(255,255,255,0.1);padding:8px 12px;border-radius:12px;}
.password-item span{overflow-wrap:anywhere;}
.password-item button{background:#ff6b6b;}
.password-item button.edit{background:#00f5ff;}
.logout{margin-top:15px;background:transparent;border:1px solid rgba(255,255,255,0.3);}
.logout:hover{background:rgba(255,255,255,0.1);box-shadow:none;}
.menu{display:none;flex-direction:column;gap:10px;text-align:left;width:100%;}
</style>
</head>
<body>
<div class="circle circle1"></div>
<div class="circle circle2"></div>

<!-- Login Card -->
<div class="card" id="loginCard">
<h2>EXCLUSIVE ACCESS</h2>
<div class="input-group">
<label>Ange lösenord</label>
<input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter'){login()}">
</div>
<button onclick="login()">Logga in</button>
<div class="error" id="error"></div>
</div>

<!-- Dashboard -->
<div class="card dashboard" id="dashboard">
<h2>Lösenordshanterare</h2>

<!-- Lägg till lösenord -->
<button onclick="showMenu()">Lägg till lösenord</button>

<div class="menu card" id="menu">
<div class="input-group">
<label>App / Företag</label>
<input type="text" id="appInput">
</div>
<div class="input-group">
<label>Lösenord</label>
<input type="text" id="newPassword">
</div>
<div class="input-group">
<label>Anteckningar (valfritt)</label>
<input type="text" id="notesInput">
</div>
<button onclick="addPassword()">Spara</button>
<button onclick="hideMenu()">Avbryt</button>
</div>

<!-- Sökfält alltid på dashboard -->
<div class="input-group">
<label>Sök lösenord</label>
<input type="text" id="searchInput" placeholder="Sök app/företag/lösenord" oninput="searchPassword()">
</div>

<div class="password-list" id="passwordList"></div>
<button class="logout" onclick="logout()">Logga ut</button>
</div>

<script>
const correctPassword = "Elmer1213";
let passwords = [];

function login(){
  const password = document.getElementById("password").value;
  const error = document.getElementById("error");
  if(password === correctPassword){
    showDashboard();
  }else{
    error.textContent = "Fel lösenord";
  }
}

function showDashboard(){
  document.getElementById("loginCard").style.display="none";
  document.getElementById("dashboard").style.display="flex";
}

function logout(){
  location.reload();
}

function showMenu(){
  document.getElementById("menu").style.display="flex";
}

function hideMenu(){
  document.getElementById("menu").style.display="none";
  document.getElementById("appInput").value="";
  document.getElementById("newPassword").value="";
  document.getElementById("notesInput").value="";
}

function addPassword(){
  const app = document.getElementById("appInput").value.trim();
  const pw = document.getElementById("newPassword").value.trim();
  const notes = document.getElementById("notesInput").value.trim();
  if(!app || !pw){ alert("App och lösenord krävs!"); return; }
  passwords.push({ app, pw, notes });
  hideMenu();
  searchPassword();
}

// Visa lösenord baserat på sök
function searchPassword(){
  const query = document.getElementById("searchInput").value.toLowerCase();
  const list = document.getElementById("passwordList");
  list.innerHTML = '';
  if(query===""){ return; } // Visa inget om sökrutan är tom
  const filtered = passwords.filter(p => 
    p.app.toLowerCase().includes(query) || 
    p.pw.toLowerCase().includes(query) || 
    (p.notes && p.notes.toLowerCase().includes(query))
  );
  if(filtered.length === 0){ list.textContent="Inga resultat"; return; }
  filtered.forEach((p, index)=>{
    const div = document.createElement('div');
    div.className='password-item';
    const span = document.createElement('span');
    span.textContent = `${p.app} : ${p.pw} ${p.notes? '('+p.notes+')':''}`;
    div.appendChild(span);

    const editBtn = document.createElement('button');
    editBtn.textContent='Redigera';
    editBtn.className='edit';
    editBtn.onclick = ()=>{ 
      const newApp = prompt("Redigera app/företag", p.app);
      const newPw = prompt("Redigera lösenord", p.pw);
      const newNotes = prompt("Redigera anteckningar", p.notes);
      if(newApp && newPw){
        passwords[index] = { app:newApp, pw:newPw, notes:newNotes };
        searchPassword();
      }
    };
    div.appendChild(editBtn);

    const delBtn = document.createElement('button');
    delBtn.textContent='Ta bort';
    delBtn.onclick=()=>{
      passwords.splice(index,1);
      searchPassword();
    };
    div.appendChild(delBtn);

    list.appendChild(div);
  });
}



// Spara lösenord
function addPassword(){
  const app = document.getElementById("appInput").value.trim();
  const pw = document.getElementById("newPassword").value.trim();
  const notes = document.getElementById("notesInput").value.trim();
  if(!app || !pw){ alert("App och lösenord krävs!"); return; }
  passwords.push({ app, pw, notes });
  hideMenu();
  savePasswords(); // Spara i localStorage
  searchPassword();
}

// Spara hela arrayen i localStorage
function savePasswords(){
  localStorage.setItem("passwords", JSON.stringify(passwords));
}

// Läs lösenord från localStorage när sidan laddas
window.onload = function(){
  const stored = localStorage.getItem("passwords");
  if(stored) passwords = JSON.parse(stored);
};

function searchPassword(){
  const query = document.getElementById("searchInput").value.toLowerCase();
  const list = document.getElementById("passwordList");
  list.innerHTML = '';
  if(query===""){ return; } // Visa inget om sökrutan är tom

  const filtered = passwords.filter(p => 
    p.app.toLowerCase().includes(query) || 
    p.pw.toLowerCase().includes(query) || 
    (p.notes && p.notes.toLowerCase().includes(query))
  );

  if(filtered.length === 0){ 
    list.textContent="Inga resultat"; 
    return; 
  }

  // Visa max 3
  const limited = filtered.slice(0,3);

  limited.forEach((p, index)=>{
    const div = document.createElement('div');
    div.className='password-item';
    const span = document.createElement('span');
    span.textContent = `${p.app} : ${p.pw} ${p.notes? '('+p.notes+')':''}`;
    div.appendChild(span);

    const editBtn = document.createElement('button');
    editBtn.textContent='Redigera';
    editBtn.className='edit';
    editBtn.onclick = ()=>{ 
      const newApp = prompt("Redigera app/företag", p.app);
      const newPw = prompt("Redigera lösenord", p.pw);
      const newNotes = prompt("Redigera anteckningar", p.notes);
      if(newApp && newPw){
        passwords[index] = { app:newApp, pw:newPw, notes:newNotes };
        savePasswords();
        searchPassword();
      }
    };
    div.appendChild(editBtn);

    const delBtn = document.createElement('button');
    delBtn.textContent='Ta bort';
    delBtn.onclick=()=>{
      passwords.splice(index,1);
      savePasswords();
      searchPassword();
    };
    div.appendChild(delBtn);

    list.appendChild(div);
  });
}

</script>
</body>
</html>
